# =====================================================================
# lab/l2tp-nonat — compose RIÊNG, topology AN TOÀN cho P0.8c (native ESP, no-NAT).
#
# 2 container trên CÙNG một Docker bridge tùy biến 'labnet':
#   - l2tp-server : strongSwan (IKEv1 PSK + ESP transport) + xl2tpd + pppd CHUẨN
#   - dotnet-client: chạy binary demo .NET self-contained đã publish, CAP_NET_RAW
#
# Vì sao AN TOÀN (khác lab cũ §7.5):
#   - KHÔNG network_mode: host  -> strongSwan đụng XFRM CHỈ trong netns container,
#     KHÔNG phá mạng VM (lab cũ host-net từng làm SẬP cả SSH+ping của VM).
#   - KHÔNG privileged-trên-host -> chỉ NET_ADMIN trong netns riêng.
#   - 2 container cùng bridge -> gói proto-50 đi L2 thẳng, KHÔNG NAT -> NAT-D thấy
#     "không NAT" -> strongSwan giữ ESP proto-50 (đúng điều kiện kích hoạt native-ESP).
#   - KHÔNG publish cổng ra ngoài: test hoàn toàn nội bộ bridge.
# =====================================================================
services:
  l2tp-server:
    build:
      context: .
    image: lab-l2tp-nonat:22.04
    container_name: lab-l2tp-server
    restart: "no"
    cap_add:
      - NET_ADMIN          # tạo XFRM SA + ppp interface trong netns container (KHÔNG đụng VM)
    # KHÔNG privileged, KHÔNG network_mode: host (đó là phần nguy hiểm của lab cũ).
    devices:
      - /dev/ppp:/dev/ppp  # pppd cần /dev/ppp; host VM phải 'modprobe ppp_generic' TRƯỚC
    # bridge mode CHO PHÉP sysctls (host-net thì Docker từ chối). Đặt forwarding ở đây + entrypoint.
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    networks:
      - labnet
    # KHÔNG 'ports:' — không cần publish; client nối nội bộ bridge qua tên service.

  dotnet-client:
    # runtime-deps đủ chạy binary self-contained publish (linux-x64). KHÔNG cần SDK.
    image: mcr.microsoft.com/dotnet/runtime-deps:8.0
    container_name: lab-l2tp-client
    restart: "no"
    cap_add:
      - NET_RAW            # P0.8c: raw socket gửi/nhận ESP proto-50 native (HonestFirst)
    networks:
      - labnet
    volumes:
      # Mount thư mục publish của VM (đặt binary demo vào ./client-bin trên VM trước).
      - ./client-bin:/opt/client:ro
    working_dir: /opt/client
    # TẠM chạy thủ công: container đứng yên, runbook 'docker exec' chạy demo với --native-esp.
    # (dễ chạy lại + đổi tham số khi debug, không phải rebuild/restart.)
    entrypoint: ["sleep", "infinity"]
    # Chờ server sẵn sàng tên DNS (không bắt buộc; chỉ giúp thứ tự khởi động).
    depends_on:
      - l2tp-server

networks:
  # bridge tùy biến: intra-bridge mặc định KHÔNG NAT giữa các container cùng mạng
  # (NAT chỉ áp cho traffic RA NGOÀI host) -> proto-50 đi thẳng -> no-NAT cho P0.8c.
  labnet:
    driver: bridge
