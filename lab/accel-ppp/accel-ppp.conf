# =====================================================================
# accel-ppp.conf — lab Q.1  (đã đối chiếu man page bản build-from-source 9ddf513)
# SSTP (TCP/443) + L2TP (UDP/1701) + PPTP (TCP/1723), PPP auth MS-CHAPv2,
# IPv4 pool + IPv6 pool GLOBAL (ULA) — module ipv6_nd tự gửi Router Advertisement
# (SLAAC) trên ppp ⇒ client tạo địa chỉ global. Đây là cái validate P1.1(2).
# =====================================================================

[modules]
# Module cài ở /usr/lib64/accel-ppp (build-from-source, prefix /usr). Khai path cho chắc.
path=/usr/lib64/accel-ppp
log_file
# --- auth ---
auth_mschap_v2
auth_mschap_v1
auth_chap_md5
auth_pap
# --- giao thức ---
sstp
l2tp
pptp
# --- cấp địa chỉ ---
ippool
ipv6pool          # pool IPv6 (chia prefix thành /64 cho client)
ipv6_nd           # gửi Router Advertisement (SLAAC) trên ppp — KHÔNG có [ipv6-nd] section, load là đủ
ipv6_dhcp         # DHCPv6 server trên ppp (đường thứ 2 lấy global / DNS, O-flag)
chap-secrets

[core]
log-error=/var/log/accel-ppp/core.log
thread-count=4

[log]
log-file=/var/log/accel-ppp/accel-ppp.log
copy=1
level=3            # 3=info; nâng lên 5 nếu cần debug sâu

[ppp]
verbose=1
min-mtu=1280       # đủ cho IPv6
mtu=1400
mru=1400
mppe=prefer        # PPTP dùng MPPE; SSTP đã có TLS nên không ép
ipv4=require       # luôn cấp IPv4
ipv6=allow         # cho phép IPV6CP — client nào yêu cầu thì cấp /64 từ pool + RA
ipv6-intf-id=0:0:0:1        # interface-id của server (man: dạng x:x:x:x, KHÔNG phải 'random')
ipv6-peer-intf-id=0:0:0:2   # gợi ý id cho peer
ipv6-accept-peer-intf-id=1  # chấp nhận interface-id client tự đề xuất (PppEngine sinh ngẫu nhiên)
lcp-echo-interval=30
lcp-echo-failure=3

[auth]
# (mặc định đủ — MS-CHAPv2 ưu tiên do thứ tự module ở trên)

# accel-ppp TỪ CHỐI client nếu địa chỉ cấp không nằm trong [client-ip-range]
# (cảnh báo "incoming ... connections will be rejected" nếu thiếu). Lab cho phép mọi IP.
[client-ip-range]
disable

# ---- IPv4 pool (trong tunnel) ----
[ip-pool]
gw-ip-address=10.20.0.1
10.20.0.2-100

[dns]
dns1=1.1.1.1
dns2=8.8.8.8

# ---- IPv6 pool (trong tunnel) — ĐÂY là cái validate P1.1(2) SLAAC-over-PPP ----
# Prefix ULA fd00:dead:beef::/48 chia thành các /64; mỗi client một /64. ULA KHÔNG ra
# internet thật nhưng CHỨNG MINH được client tạo địa chỉ GLOBAL-scope qua RA/SLAAC.
[ipv6-pool]
fd00:dead:beef::/48,64,name=ipv6lab

# ---- DHCPv6 (tuỳ chọn) — chỉ aftr-gw là cấu hình được; địa chỉ lấy từ [ipv6-pool] ----
[ipv6-dhcp]

# =====================================================================
# Listener từng giao thức
# =====================================================================

[sstp]
verbose=1
# Cert TLS self-signed do entrypoint.sh sinh vào /etc/accel-ppp/certs (key+cert cùng 1 PEM).
# ⚠️ Client .NET PHẢI chấp nhận cert bất kỳ (self-signed) — SstpDriver truyền callback always-true.
ssl-pemfile=/etc/accel-ppp/certs/sstp.pem
accept=ssl
port=443
ifname=sstp%d
ipv6-pool=ipv6lab

[l2tp]
verbose=1
# KHÔNG bật IPsec ở accel-ppp — IKE/ESP do strongSwan lo (transport mode bọc UDP/1701).
bind=0.0.0.0
port=1701
host-name=lab-accel-ppp
ipv6-pool=ipv6lab

[pptp]
verbose=1
echo-interval=30
echo-failure=3
ipv6-pool=ipv6lab

# ---- chap-secrets (user/pass MS-CHAPv2) ----
[chap-secrets]
chap-secrets=/etc/ppp/chap-secrets

# ---- quản trị runtime: accel-cmd show sessions ----
[cli]
verbose=1
tcp=127.0.0.1:2000
