# vtund server config for the V.11 live lab: one host 'test', password 'pass', type tun, proto tcp,
# encrypt no, compress no. Server tunnel IP 10.11.0.1, client 10.11.0.2 (point-to-point).
options {
  port 5000;                    # control + data port
  syslog daemon;
  # Use full paths so the up/down scripts work in the minimal container.
  ifconfig /sbin/ip;            # we call `ip` directly in the up/down blocks below
}

default {
  compress no;                  # no compression (validate the core first)
  encrypt no;                   # no data-plane crypto (auth still uses Blowfish challenge)
  speed 0;                      # no traffic shaping
  keepalive yes;                # VTUN_ECHO keepalive
}

test {
  passwd pass;                  # shared secret (MD5 -> Blowfish challenge key)
  type tun;                     # raw IP, no link header
  proto tcp;                    # TCP control + data

  # %% expands to the tunNN device vtund created. Bring it up point-to-point and route the client's /32.
  up {
    program "/sbin/ip addr add 10.11.0.1/32 peer 10.11.0.2 dev %%";
    program "/sbin/ip link set %% up mtu 1450";
  };
  down {
    program "/sbin/ip link set %% down";
  };
}

# Encrypted host for the V.11 data-plane-encryption live test: same tun/tcp, but `encrypt`
# turns on the default cipher (Blowfish-128-ECB, VTUN_ENC_BF128ECB / E1). Separate tunnel subnet
# 10.12.0.1 <-> 10.12.0.2 so it can coexist with the plaintext 'test' host above.
enc {
  passwd pass;                  # same shared secret
  type tun;
  proto tcp;
  encrypt blowfish128ecb;       # default cipher; sent to the client as flags E1

  up {
    program "/sbin/ip addr add 10.12.0.1/32 peer 10.12.0.2 dev %%";
    program "/sbin/ip link set %% up mtu 1450";
  };
  down {
    program "/sbin/ip link set %% down";
  };
}

# Tap host for the V.11 L2 (type ether) live test: vtund creates a tapNN device; the up script gives it the
# server's L2 overlay IP 10.13.0.1/24 so the client (static 10.13.0.2 on its VtunEthernetChannel + VirtualHost)
# can ARP-resolve and ping it across the L2 segment.
tapsrv {
  passwd pass;
  type ether;                   # tap / L2 — carries raw Ethernet frames
  proto tcp;
  encrypt no;

  up {
    program "/sbin/ip addr add 10.13.0.1/24 dev %%";
    program "/sbin/ip link set %% up mtu 1450";
  };
  down {
    program "/sbin/ip link set %% down";
  };
}
