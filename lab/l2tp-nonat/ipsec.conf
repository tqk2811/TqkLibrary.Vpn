# =====================================================================
# ipsec.conf — lab/l2tp-nonat strongSwan (charon, cú pháp starter/legacy)
# IKEv1 PSK + ESP transport mode bọc L2TP/UDP-1701 (LNS = xl2tpd+pppd).
#
# MỘT conn duy nhất: l2tp-psk-nonat — forceencaps=no, mong ESP proto-50.
#
# Vì sao ESP proto-50 (no-NAT): 2 container cùng một Docker bridge tùy biến
# ⇒ gói đi L2 thẳng giữa chúng, KHÔNG qua NAT. NAT-Discovery (NAT-D) của IKE
# thấy hash địa chỉ KHỚP ⇒ "không có NAT" ⇒ strongSwan GIỮ ESP proto-50
# (KHÔNG float UDP/4500). Đây chính là điều kiện kích hoạt native-ESP
# (HonestFirst) của driver — P0.8c.
#
# ⚠️ Transform ike=/esp= phải khớp đề xuất của client TqkLibrary (IkeV1Client).
#    Nếu handshake fail → soi `ipsec statusall` + log charon (charondebug),
#    xem transform nào bị từ chối rồi chỉnh.
# =====================================================================

config setup
    # uniqueids=no: cho phép nhiều phiên/nhiều client trùng id (an toàn khi test lại).
    uniqueids=no
    # charondebug verbose để debug live (xem transform nào được/bị từ chối).
    charondebug="ike 2, knl 2, cfg 2, net 1, esp 1, lib 1"

# ---- mẫu chung cho L2TP/IPsec transport mode ----
conn %default
    keyexchange=ikev1
    authby=secret
    type=transport
    # L2TP chạy trên UDP/1701; IPsec chỉ bảo vệ traffic UDP/1701 server<->client.
    leftprotoport=17/1701
    rightprotoport=17/%any
    left=%any
    leftid=%any
    right=%any
    # Đề xuất transform "rộng" để khớp client; ép xuống bộ cụ thể nếu cần interop sạch.
    # ike = Phase1 (ISAKMP SA): AES-CBC 256/128 + SHA1/SHA256 + MODP1024/MODP2048
    # esp = Phase2 (CHILD SA) : AES-CBC 256/128 + SHA1/SHA256, KHÔNG PFS (L2TP thường tắt PFS)
    # CHECK: nếu client đề xuất bộ khác (vd 3DES/MD5 hay MODP1536), thêm vào đây.
    ike=aes256-sha1-modp1024,aes128-sha1-modp1024,aes256-sha256-modp2048,aes128-sha256-modp2048!
    esp=aes256-sha1,aes128-sha1,aes256-sha256,aes128-sha256!
    # Dead-peer-detection: dọn SA chết khi client biến mất.
    dpdaction=clear
    dpddelay=30s
    dpdtimeout=120s

# (P0.8c) No-NAT, mong ESP proto-50 — phục vụ native ESP HonestFirst.
# forceencaps=no: KHÔNG ép bọc ESP-in-UDP/4500. Vì 2 container cùng bridge
# (no-NAT), NAT-D thấy "không NAT" ⇒ strongSwan giữ ESP proto-50 thật.
conn l2tp-psk-nonat
    also=%default
    ikelifetime=8h
    lifetime=1h
    forceencaps=no
    # auto=add: nạp conn (chờ client khởi xướng); KHÔNG auto=start (server không chủ động nối).
    auto=add
    # CHECK: một số bản có thêm 'encap=no' (đồng nghĩa forceencaps=no). Nếu vẫn
    #        thấy float 4500, kiểm strongswan.conf KHÔNG bật nat_traversal cứng.
