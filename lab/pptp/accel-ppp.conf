# =====================================================================
# accel-ppp.conf — lab/pptp (V.6), CHỈ PPTP. PPP auth MS-CHAPv2 + MPPE require-128.
# Tối giản (bỏ SSTP/L2TP/IPv6 của lab/accel-ppp chung) để dựng riêng cho validate GRE-47.
# Module ở /usr/lib64/accel-ppp (build-from-source trong image lab-accel-ppp:24.04).
# =====================================================================

[modules]
path=/usr/lib64/accel-ppp
log_file
# --- auth: chỉ MS-CHAPv2 (PPTP + MPPE bắt buộc MS-CHAPv2; MPPE key suy từ NT-Response) ---
auth_mschap_v2
# --- giao thức: chỉ PPTP ---
pptp
# --- cấp địa chỉ IPv4 ---
ippool
chap-secrets

[core]
log-error=/var/log/accel-ppp/core.log
thread-count=4

[log]
log-file=/var/log/accel-ppp/accel-ppp.log
copy=1
level=5            # 5 = debug sâu — cần để soi handshake PPTP/GRE/MPPE khi validate live

[ppp]
verbose=1
min-mtu=1280
mtu=1400
mru=1400
mppe=require       # PPTP: ép MPPE (RFC 3078) — MS-CHAPv2 cung cấp key. 'require' = từ chối client không MPPE.
ipv4=require       # luôn cấp IPv4
lcp-echo-interval=30
lcp-echo-failure=3

[auth]
# (mặc định đủ — chỉ load auth_mschap_v2 nên MS-CHAPv2 là phương thức duy nhất)

# accel-ppp TỪ CHỐI client nếu địa chỉ cấp không nằm trong [client-ip-range].
# Lab cho phép mọi IP (disable kiểm tra range).
[client-ip-range]
disable

# ---- IPv4 pool (trong tunnel) ----
[ip-pool]
gw-ip-address=10.80.0.1
10.80.0.2-100

[dns]
dns1=1.1.1.1
dns2=8.8.8.8

# =====================================================================
# Listener PPTP (control TCP/1723; GRE proto-47 do daemon mở raw socket)
# =====================================================================
[pptp]
verbose=1
echo-interval=30
echo-failure=3

# ---- chap-secrets (user/pass MS-CHAPv2) ----
[chap-secrets]
chap-secrets=/etc/ppp/chap-secrets

# ---- quản trị runtime: accel-cmd show sessions ----
[cli]
verbose=1
tcp=127.0.0.1:2000
