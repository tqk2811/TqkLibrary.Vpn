; =====================================================================
; xl2tpd.conf — LNS (L2TP Network Server) cho lab/l2tp-nonat.
; xl2tpd nghe UDP/1701 (đã được strongSwan bọc ESP transport), nhận L2TP
; control, rồi spawn pppd CHUẨN (options từ /etc/ppp/options.xl2tpd) cho
; mỗi phiên. pppd lo PPP/IPCP/IPV6CP + xác thực CHAP/MS-CHAPv2.
;
; Cú pháp xl2tpd dùng ';' cho comment (KHÔNG '#').
; =====================================================================

[global]
; CHECK: KHÔNG đặt 'listen-addr' để xl2tpd bind mọi địa chỉ (0.0.0.0:1701).
;        IPsec/strongSwan đã bảo vệ 1701 nên không lo lộ.
; ipsec saref = no   ; (mặc định) không dùng SAref — đơn giản hóa.
port = 1701

[lns default]
; Dải IP cấp cho client qua IPCP (peer). local ip = gateway phía server.
ip range = 10.31.0.10-10.31.0.20
local ip = 10.31.0.1
; refuse pap + require chap: bắt client dùng CHAP/MS-CHAPv2 (driver repo hỗ trợ).
require chap = yes
refuse pap = yes
; Tên local để pppd tra chap-secrets (cột 'server').
name = l2tpd
; pppd đọc options từ file này (xem options.xl2tpd).
pppoptfile = /etc/ppp/options.xl2tpd
; length bit = yes: gửi Length trong L2TP data header (tương thích rộng).
length bit = yes
; CHECK: 'require authentication = yes' (mặc định bật khi require chap). Nếu
;        client KHÔNG xác thực được, soi log pppd (debug đã bật trong options).
; CHECK: client TqkLibrary có gửi L2TP TUNNEL secret không? Nếu CÓ thì thêm
;        'challenge = yes' + secret tương ứng; nếu KHÔNG (thường L2TP/IPsec
;        dựa IPsec cho bảo mật tunnel) thì để mặc định (không challenge).
