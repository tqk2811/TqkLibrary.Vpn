# strongswan.conf — cấu hình charon cho lab/l2tp-nonat
# Mục tiêu: KHÔNG ép NAT-T toàn cục, để forceencaps=no (per-conn) quyết định
# việc giữ ESP proto-50 trong kịch bản no-NAT (P0.8c).
charon {
    # install_routes/install_virtual_ip mặc định cho transport mode L2TP.
    install_routes = yes
    install_virtual_ip = yes

    # KHÔNG đặt option ép NAT-T global ở đây (vd KHÔNG 'i_dont_care_about_security_and_use_aggressive_mode_psk'
    # và KHÔNG bật cứng nat_traversal) — để NAT-D tự quyết. forceencaps đã đặt PER-CONN.

    # Log ra stderr để `docker compose logs` / `docker logs` thấy.
    filelog {
        stderr {
            default = 2
            ike = 2
            knl = 2
        }
    }

    plugins {
        bypass-lan {
            # TẮT bypass-lan: plugin này cài PASS shunt cho mọi subnet directly-connected
            # (ở đây 172.20.0.0/16). Trong lab client+server CÙNG subnet bridge ⇒ gói server
            # gửi VỀ client khớp shunt → đi PLAINTEXT (không mã hóa ESP) thay vì khớp transport
            # SA → client (chờ ESP) không nhận được reply L2TP. Tắt để policy transport SA là
            # cái DUY NHẤT khớp traffic udp/1701 giữa hai bên. (Đã xác nhận live.)
            load = no
        }
    }
}
