# V.7.4 header-encryption (-H) live lab: a real n2n v3.1.1 supernode + a real edge gateway (edge2, tun overlay
# 10.7.0.1/24) + the .NET client edge (driver Drivers.N2n, overlay 10.7.0.2/24) — all running with -H (header
# encryption ON, SPECK + Pearson key derived from community "labnet"). Transform still NULL (payload in the clear);
# only the common header is SPECK-encrypted on the wire. This validates N2nHeaderEncryption interop end-to-end.
#
# The .NET client builds REGISTER_SUPER with an ENCRYPTED header that the supernode (running -H) must accept, then
# ICMP echo 10.7.0.2 -> 10.7.0.1 over the L2 overlay with -H on the PACKET headers too.
#
#   docker compose -f lab/n2n/docker-compose.he.yml up -d supernode edge2
#   docker compose -f lab/n2n/docker-compose.he.yml up -d client
#   docker exec n2n-he-client sh -c 'cd /app && ./Vpn2ProxyDemo dns --vpn /lab/client.he.n2n'
#     -> "Gateway nội bộ: 10.7.0.1 (ICMP reachable, RTT X ms)"
#   docker logs n2n-he-supernode 2>&1 | grep -iE 'register|header|community'   # no "unknown community"/"header decrypt"
#   docker exec n2n-he-supernode sh -c 'tcpdump -i any -nX udp port 7654' &    # header bytes encrypted on the wire
#   docker compose -f lab/n2n/docker-compose.he.yml down -v
services:
  supernode:
    image: n2n-v3:lab
    container_name: n2n-he-supernode
    # Header encryption needs the supernode to know the community names up front (it can't read the encrypted header
    # otherwise): -c lists the allowed communities so it can derive each header key. No -H flag on the supernode.
    command: ["supernode", "-c", "/community.list", "-f", "-vvv"]
    volumes:
      - ./community.list:/community.list:ro
    networks: [labnet]

  # A real n2n edge acting as the in-overlay gateway, running with -H.
  edge2:
    image: n2n-v3:lab
    container_name: n2n-he-edge2
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun"]
    depends_on: [supernode]
    networks: [labnet]
    # -H: header encryption; -A1: NULL transform (payload in the clear) so only the header layer is under test.
    command: ["edge", "-d", "edge0", "-a", "10.7.0.1", "-c", "labnet", "-l", "supernode:7654", "-H", "-A1", "-r", "-f", "-vv"]

  # The .NET client edge with header encryption enabled (headerencryption=true in the .n2n config).
  client:
    image: mcr.microsoft.com/dotnet/runtime-deps:8.0
    container_name: n2n-he-client
    depends_on: [supernode, edge2]
    networks: [labnet]
    volumes:
      - ./client-bin:/app:ro
      - ./client.he.n2n:/lab/client.he.n2n:ro
    working_dir: /app
    command: sleep infinity

networks:
  labnet:
